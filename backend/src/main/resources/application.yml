server:
  port: 8080

spring:
  application:
    name: water-delivery-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: jdbc:mysql://localhost:3306/bottled_water_delivery?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: bottled-water-delivery-demo-secret-2026
    expire-hours: 72

springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
